openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: ask
    description: AI Q&A operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /ask:
    post:
      operationId: askQuestion
      tags: [ask]
      summary: Ask a question to DeepSeek AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AskInput"
      responses:
        "200":
          description: AI-generated answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AskAnswer"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AskInput:
      type: object
      properties:
        question:
          type: string
      required:
        - question
    AskAnswer:
      type: object
      properties:
        answer:
          type: string
      required:
        - answer
